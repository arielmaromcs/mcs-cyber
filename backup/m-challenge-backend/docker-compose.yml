services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mchallenge
      POSTGRES_USER: mchallenge
      POSTGRES_PASSWORD: mchallenge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mchallenge"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Redis (for BullMQ / optional) ----
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Backend API ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://mchallenge:mchallenge@postgres:5432/mchallenge?schema=public"
      REDIS_URL: "redis://redis:6379"
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      JWT_SECRET: "${JWT_SECRET:-change-this-secret-in-production}"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:3000}"
      # External API keys (optional)
      NMAP_API_URL: "${NMAP_API_URL:-http://45.79.208.66:8888/nmap}"
      NMAP_API_KEY: "${NMAP_API_KEY:-}"
      SHODAN_API_KEY: "${SHODAN_API_KEY:-}"
      ABUSEIPDB_API_KEY: "${ABUSEIPDB_API_KEY:-}"
      LLM_PROVIDER: "${LLM_PROVIDER:-local}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-gpt-4o}"
      LLM_BASE_URL: "${LLM_BASE_URL:-https://api.openai.com/v1}"
      EMAIL_PROVIDER: "${EMAIL_PROVIDER:-smtp}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
